<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Adury Collection</title>
    <style>
        body { font-family: Arial, sans-serif; background: #fdf2f8; margin: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: white; padding: 10px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 120px; border-radius: 8px; margin-bottom: 5px; }
        .pulse { animation: pulse-animation 2s infinite; background: #25d366; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        @keyframes pulse-animation { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        /* পপআপ স্টাইল */
        #panel { display: none; position: fixed; bottom: 0; width: 100%; background: white; padding: 20px; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="grid" id="shop"></div>

<div id="panel">
    <h3>অর্ডার কনফার্ম করুন</h3>
    <input type="text" id="name" placeholder="নাম" style="width:90%; padding:10px; margin:5px;"><br>
    <input type="text" id="phone" placeholder="ফোন নাম্বার" style="width:90%; padding:10px; margin:5px;"><br>
    <input type="text" id="addr" placeholder="ঠিকানা" style="width:90%; padding:10px; margin:5px;"><br>
    <p>মোট পিস: <span id="p-qty"></span> | চার্জ: ১৫০ টাকা</p>
    <button class="pulse" onclick="confirmOrder()">কনফার্ম অর্ডার (WhatsApp)</button>
</div>

<script>
    const products = [
        { name: "কাশ্মীরি থ্রি-পিস", price: 480, img: "https://via.placeholder.com/150", qty: 0 },
        { name: "জমজম থ্রি-পিস", price: 620, img: "https://via.placeholder.com/150", qty: 0 }
    ];

    function render() {
        document.getElementById('shop').innerHTML = products.map((p, i) => `
            <div class="card">
                <img src="${p.img}">
                <b>${p.name}</b><br>${p.price} টাকা
                <div style="margin:5px 0">
                    <button onclick="update(${i}, -1)">-</button> <span>${p.qty}</span> <button onclick="update(${i}, 1)">+</button>
                </div>
                <button class="pulse" onclick="openPanel(${i})">অর্ডার নাও</button>
            </div>
        `).join('');
    }

    let selectedIdx = 0;
    function update(i, v) { products[i].qty = Math.max(0, products[i].qty + v); render(); }
    function openPanel(i) { 
        selectedIdx = i; 
        document.getElementById('p-qty').innerText = products[i].qty;
        document.getElementById('panel').style.display = 'block'; 
    }
    
    function confirmOrder() {
        let p = products[selectedIdx];
        let msg = `নাম: ${document.getElementById('name').value}%0Aফোন: ${document.getElementById('phone').value}%0Aঠিকানা: ${document.getElementById('addr').value}%0Aপণ্য: ${p.name} (${p.qty} পিস)%0Aসর্বমোট: ${(p.qty * p.price) + 150} টাকা`;
        window.open("https://wa.me/8801969080416?text=" + msg, "_blank");
    }
    render();
</script>
</body>
</html>
