<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adury Collection | Premium Three-Piece Shop</title>
    <style>
        /* মূল স্টাইল */
        body { font-family: 'Hind Siliguri', sans-serif; margin: 0; background: #fdfdfd; }
        .header { background: #1a1a1a; color: white; padding: 15px; text-align: center; }
        .hero { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1595777457583-95e059d50a58?auto=format&fit=crop&w=1200&q=80'); background-size: cover; height: 350px; display: flex; align-items: center; justify-content: center; color: white; text-align: center; }
        
        /* কন্টেইনার এবং গ্রিড */
        .container { width: 90%; max-width: 900px; margin: auto; padding: 20px; }
        .section-title { text-align: center; margin: 40px 0; font-size: 28px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
        .product-card { background: white; border: 1px solid #eee; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        /* ফিচারের সেকশন */
        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 40px 0; text-align: center; }
        .feature-box { padding: 20px; background: #fff8f8; border-radius: 10px; }
        
        /* মডাল এবং ফর্ম */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; overflow-y: auto; }
        .modal-content { background: white; width: 90%; max-width: 450px; margin: 50px auto; padding: 25px; border-radius: 20px; }
        .input-box { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        
        /* ফুটার */
        .footer { background: #1a1a1a; color: #888; text-align: center; padding: 30px; margin-top: 50px; }
    </style>
</head>
<body>

    <header class="header"><h1>Adury Collection</h1></header>

    <section class="hero">
        <div>
            <h1>নতুন কালেকশন ২০২১</h1>
            <p>সেরা মানের থ্রি-পিস, সেরা দামে</p>
        </div>
    </section>

    <div class="container">
        <div class="features">
            <div class="feature-box">🚚 দ্রুত ডেলিভারি</div>
            <div class="feature-box">💎 প্রিমিয়াম কোয়ালিটি</div>
            <div class="feature-box">📞 ২৪/৭ সাপোর্ট</div>
        </div>

        <h2 class="section-title">আমাদের পণ্যসমূহ</h2>
        <div class="product-grid" id="product-list"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>অর্ডার কনফার্ম করুন</h3>
            <div id="summary" style="background:#f9f9f9; padding:15px; border-radius:10px; font-size:14px; margin-bottom:15px;"></div>
            <select id="color" class="input-box"><option>রঙ পছন্দ করুন</option><option>লাল</option><option>নীল</option><option>সবুজ</option></select>
            <input type="text" id="name" class="input-box" placeholder="আপনার নাম">
            <input type="text" id="addr" class="input-box" placeholder="আপনার ঠিকানা">
            <input type="text" id="phone" class="input-box" placeholder="ফোন নম্বর">
            <button class="btn" style="background:#28a745; color:white;" onclick="placeOrder()">অর্ডার নিশ্চিত করুন</button>
            <button class="btn" style="background:#dc3545; color:white; margin-top:10px;" onclick="closeModal()">বাতিল করুন</button>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Adury Collection | সব অধিকার সংরক্ষিত</p>
    </footer>

    <script>
        const products = [
            {id: 1, name: "কাশ্মীরি থ্রি-পিস", price: 490},
            {id: 2, name: "এয়ারটেল থ্রি-পিস", price: 550},
            {id: 3, name: "জমজম থ্রি-পিস", price: 600}
        ];

        function render() {
            document.getElementById('product-list').innerHTML = products.map(p => `
                <div class="product-card">
                    <h3>${p.name}</h3>
                    <p style="color:red; font-weight:bold;">দাম: ৳${p.price}</p>
                    <div id="ctrl-${p.id}">
                        <button class="btn" style="background:#ff4081; color:white;" onclick="showQty(${p.id})">Order Now</button>
                    </div>
                </div>
            `).join('');
        }

        function showQty(id) {
            document.getElementById(`ctrl-${id}`).innerHTML = `
                <button onclick="qty(${id},-1)">-</button> 
                <span id="q-${id}" style="font-weight:bold; margin:0 15px;">1</span> 
                <button onclick="qty(${id},1)">+</button>
                <button class="btn" style="margin-top:10px; background:#28a745; color:white;" onclick="openModal(${id})">Confirm</button>
            `;
        }

        function qty(id, v) {
            let el = document.getElementById(`q-${id}`);
            el.innerText = Math.max(1, parseInt(el.innerText) + v);
        }

        function openModal(id) {
            let p = products.find(x => x.id === id);
            let q = parseInt(document.getElementById(`q-${id}`).innerText);
            let del = 130 + (q > 2 ? (q - 2) * 10 : 0);
            document.getElementById('summary').innerHTML = `
                পণ্য: ${p.name} (${q} পিস)<br>পণ্যের দাম: ৳${p.price * q}<br>ডেলিভারি চার্জ: ৳${del}<br><b>মোট বিল: ৳${(p.price * q) + del}</b>
            `;
            window.data = {p, q, total: (p.price * q) + del};
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function placeOrder() {
            let d = window.data;
            let msg = `অর্ডার!%0Aপণ্য: ${d.p.name}%0Aপরিমাণ: ${d.q} পিস%0Aমোট বিল: ৳${d.total}%0Aনাম: ${document.getElementById('name').value}%0Aঠিকানা: ${document.getElementById('addr').value}%0Aফোন: ${document.getElementById('phone').value}%0Aরঙ: ${document.getElementById('color').value}`;
            window.location.href = `https://wa.me/8801969080416?text=${msg}`;
        }
        render();
    </script>
</body>
</html>
