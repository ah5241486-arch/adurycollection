<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adury Collection - প্রিমিয়াম থ্রি-পিস</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f9f9f9; }
        .banner { background: #d63384; color: white; padding: 40px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
        .btn { background: #25d366; color: white; padding: 12px; text-decoration: none; display: block; margin-top: 10px; border-radius: 5px; font-weight: bold; }
        .delivery-info { background: #fff3cd; padding: 15px; margin: 20px; border-radius: 5px; border-left: 5px solid #ffc107; }
    </style>
</head>
<body>

<div class="banner">
    <h1>Adury Collection</h1>
    <p>সেরা পাইকারি ও প্রিমিয়াম থ্রি-পিস কালেকশন</p>
</div>

<div class="delivery-info">
    <strong>ডেলিভারি চার্জ:</strong> প্রথম পিস ১৩০ টাকা, পরবর্তী প্রতি পিস ১০ টাকা যোগ হবে।
</div>

<div class="grid" id="shop"></div>

<script>
    const products = [
        { name: "কাশ্মীরি থ্রি-পিস", price: 600, img: "https://via.placeholder.com/300" },
        { name: "সিল্ক থ্রি-পিস", price: 750, img: "https://via.placeholder.com/300" }
    ];

    const shop = document.getElementById('shop');
    products.forEach(p => {
        shop.innerHTML += `
            <div class="card">
                <img src="${p.img}" alt="${p.name}">
                <h3>${p.name}</h3>
                <p>দাম: ${p.price} টাকা</p>
                <a href="https://wa.me/8801969080416?text=আমি ${p.name} অর্ডার করতে চাই। ডেলিভারি চার্জ হিসাব করুন।" class="btn">WhatsApp-এ অর্ডার করুন</a>
            </div>
        `;
    });
</script>
</body>
</html>
