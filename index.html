<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adury Collection | Home</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="header">
        <div class="container">
            <div class="logo">Adury<span>Collection</span></div>
            <nav class="navbar">
                <ul>
                    <li><a href="index.html">হোম</a></li>
                    <li><a href="#">শপ</a></li>
                    <li><a href="#">যোগাযোগ</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="main-content">
        <section class="hero">
            <div class="container">
                <h1>আপনার স্টাইলের নতুন ঠিকানা</h1>
                <p>সেরা কালেকশন এবং প্রিমিয়াম কোয়ালিটি পণ্য এখন হাতের নাগালে।</p>
                <a href="#flash-sale" class="btn-shop">কেনাকাটা শুরু করুন</a>
            </div>
        </section>

        <section class="flash-sale" id="flash-sale">
            <div class="container">
                <h2>ফ্ল্যাশ সেল</h2>
                <div class="product-grid" id="flash-sale-products">
                    </div>
            </div>
        </section>
    </main>

    <div id="checkout-modal" style="display:none; position:fixed; top:15%; left:5%; width:90%; background:white; padding:20px; border-radius:15px; box-shadow:0 0 20px rgba(0,0,0,0.3); z-index:1000; text-align:center;">
        <h3>আপনার তথ্য দিন</h3>
        <input type="text" id="cust-name" placeholder="আপনার নাম" style="width:100%; padding:10px; margin:5px 0; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;">
        <input type="text" id="cust-address" placeholder="আপনার ঠিকানা" style="width:100%; padding:10px; margin:5px 0; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;">
        <input type="text" id="cust-phone" placeholder="ফোন নম্বর" style="width:100%; padding:10px; margin:5px 0; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;">
        <button onclick="confirmOrder()" class="pulsate-btn" style="width:100%; background:green; color:white; border:none; padding:12px; border-radius:5px; margin-top:10px; font-weight:bold; cursor:pointer;">অর্ডার নিশ্চিত করুন</button>
        <button onclick="document.getElementById('checkout-modal').style.display='none'" style="width:100%; background:#ccc; border:none; padding:10px; border-radius:5px; margin-top:5px; cursor:pointer;">বন্ধ করুন</button>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; ২০২৬ Adury Collection - সর্বস্বত্ব সংরক্ষিত।</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
