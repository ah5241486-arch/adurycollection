<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adury Collection - প্রিমিয়াম শপ</title>
    <style>
        :root { --primary: #db2777; --secondary: #25d366; }
        body { font-family: 'Arial', sans-serif; background: #fdf2f8; margin: 0; padding-bottom: 50px; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .banner { background: #fff; padding: 15px; margin: 10px; border-radius: 15px; text-align: center; border: 1px solid #ddd; }
        .progress-container { background: #eee; height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .progress-bar { background: var(--secondary); height: 100%; width: 0%; transition: 0.3s; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .card { background: white; padding: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .summary { background: white; padding: 20px; margin: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-qty { padding: 5px 10px; cursor: pointer; border: none; background: #eee; border-radius: 5px; }
        .order-btn { background: var(--secondary); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

<div class="header"><h1>Adury Collection</h1></div>

<div class="banner">
    <p>🔥 আরও <span id="remaining">৫০০০</span> টাকা অর্ডার করলে ডেলিভারি ফ্রি!</p>
    <div class="progress-container"><div class="progress-bar" id="progress"></div></div>
</div>

<div class="grid" id="shop"></div>

<div class="summary">
    <h2>🛒 অর্ডার সামারি</h2>
    <div id="cart-list"></div>
    <hr>
    <p>সাব-টোটাল: <span id="sub-total">0</span> টাকা</p>
    <p>ডেলিভারি চার্জ: <span id="delivery-fee">130</span> টাকা</p>
    <h3>সর্বমোট: <span id="grand-total">130</span> টাকা</h3>
    <input type="text" id="coupon" placeholder="কুপন কোড" style="width: 90%; padding: 8px;">
    <button onclick="applyCoupon()" style="padding: 8px;">Apply</button>
    <button class="order-btn" onclick="checkout()">WhatsApp-এ অর্ডার করুন</button>
</div>

<script>
    const products = [
        { name: "কাশ্মীরি থ্রি-পিস", price: 480, qty: 0 },
        { name: "জমজম থ্রি-পিস", price: 620, qty: 0 },
        { name: "লেটেক থ্রি-পিস", price: 550, qty: 0 },
        { name: "আরিসিকুয়েন্স", price: 650, qty: 0 },
        { name: "মার্শাল", price: 950, qty: 0 }
    ];

    function render() {
        const shop = document.getElementById('shop');
        shop.innerHTML = products.map((p, i) => `
            <div class="card">
                <b>${p.name}</b><br>${p.price} টাকা
                <div style="margin-top:10px">
                    <button class="btn-qty" onclick="update(${i}, -1)">-</button>
                    <span style="margin: 0 10px;">${p.qty}</span>
                    <button class="btn-qty" onclick="update(${i}, 1)">+</button>
                </div>
            </div>
        `).join('');
        calculate();
    }

    function update(i, val) {
        products[i].qty = Math.max(0, products[i].qty + val);
        render();
    }

    function calculate() {
        let totalQty = products.reduce((sum, p) => sum + p.qty, 0);
        let sub = products.reduce((sum, p) => sum + (p.qty * p.price), 0);
        let delivery = sub > 5000 ? 0 : (totalQty > 0 ? (130 + (totalQty - 1) * 10) : 0);
        
        // Progress Bar
        let percent = (sub / 5000) * 100;
        document.getElementById('progress').style.width = Math.min(percent, 100) + "%";
        document.getElementById('remaining').innerText = Math.max(0, 5000 - sub);
        
        document.getElementById('sub-total').innerText = sub;
        document.getElementById('delivery-fee').innerText = delivery;
        document.getElementById('grand-total').innerText = sub + delivery;
    }

    function checkout() {
        let items = products.filter(p => p.qty > 0).map(p => `${p.name} (${p.qty} পিস)`).join(' + ');
        let total = document.getElementById('grand-total').innerText;
        let msg = `আসসালামু আলাইকুম, আমি অর্ডার করতে চাই:%0A${items}%0A%0Aসর্বমোট বিল: ${total} টাকা`;
        window.open(`https://wa.me/8801969080416?text=${msg}`, "_blank");
    }

    function applyCoupon() { alert("কুপনটি সঠিক নয়!"); }
    render();
</script>
</body>
</html>
