<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adury Collection - প্রিমিয়াম শপ</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 0; padding: 0; }
        .header { background: #db2777; color: white; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .controls { margin: 10px 0; }
        .btn-qty { padding: 5px 10px; cursor: pointer; border: none; background: #eee; border-radius: 4px; }
        .order-btn { background: #25d366; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; margin-top: 15px; font-weight: bold; cursor: pointer; }
        .summary { background: #fff; padding: 20px; border-radius: 10px; margin: 15px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="header"><h1>Adury Collection</h1></div>

<div class="grid" id="shop"></div>

<div class="summary">
    <h3>অর্ডার সামারি</h3>
    <p>মোট পণ্যের দাম: <span id="sub-total">0</span> টাকা</p>
    <p>ডেলিভারি চার্জ: <span id="delivery-fee">0</span> টাকা</p>
    <hr>
    <h3>সর্বমোট বিল: <span id="grand-total">0</span> টাকা</h3>
    <button class="order-btn" onclick="checkout()">WhatsApp-এ অর্ডার করুন</button>
</div>

<script>
    const products = [
        { name: "কাশ্মীরি থ্রি-পিস", price: 480, qty: 0 },
        { name: "জমজম থ্রি-পিস", price: 620, qty: 0 },
        { name: "লেটেক থ্রি-পিস", price: 550, qty: 0 },
        { name: "আরিসিকুয়েন্স", price: 650, qty: 0 },
        { name: "মার্শাল", price: 950, qty: 0 }
    ];

    function render() {
        const shop = document.getElementById('shop');
        shop.innerHTML = products.map((p, i) => `
            <div class="card">
                <div style="font-weight:bold">${p.name}</div>
                <div>${p.price} টাকা</div>
                <div class="controls">
                    <button class="btn-qty" onclick="updateQty(${i}, -1)">-</button>
                    <span id="qty-${i}">${p.qty}</span>
                    <button class="btn-qty" onclick="updateQty(${i}, 1)">+</button>
                </div>
            </div>
        `).join('');
        calculate();
    }

    function updateQty(i, val) {
        products[i].qty = Math.max(0, products[i].qty + val);
        render();
    }

    function calculate() {
        let totalQty = products.reduce((sum, p) => sum + p.qty, 0);
        let subTotal = products.reduce((sum, p) => sum + (p.qty * p.price), 0);
        let deliveryFee = totalQty > 0 ? (130 + (totalQty - 1) * 10) : 0;
        
        document.getElementById('sub-total').innerText = subTotal;
        document.getElementById('delivery-fee').innerText = deliveryFee;
        document.getElementById('grand-total').innerText = subTotal + deliveryFee;
    }

    function checkout() {
        let items = products.filter(p => p.qty > 0).map(p => `${p.name} (${p.qty} পিস)`).join(', ');
        let total = document.getElementById('grand-total').innerText;
        if(items === "") { alert("প্রথমে পণ্য সিলেক্ট করুন!"); return; }
        let msg = `আমি অর্ডার করতে চাই: ${items}%0Aসর্বমোট বিল: ${total} টাকা`;
        window.open("https://wa.me/8801969080416?text=" + msg, "_blank");
    }

    render();
</script>
</body>
</html>
