<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adury Collection</title>
    <style>
        /* CSS অংশ */
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; color: #333; }
        .container { width: 90%; margin: auto; max-width: 800px; }
        .header { background: #333; color: white; padding: 20px; text-align: center; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .product-card { background: white; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .pulsate-btn { background: #ff4081; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; }
        .modal-content { background: white; width: 80%; margin: 20% auto; padding: 20px; border-radius: 10px; }
        input { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; }
        .confirm-btn { background: green; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <header class="header"><h1>Adury Collection</h1></header>

    <div class="container">
        <h2>ফ্ল্যাশ সেল</h2>
        <div class="product-grid" id="flash-sale-products"></div>
    </div>

    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <h3>অর্ডার কনফার্ম করুন</h3>
            <input type="text" id="cust-name" placeholder="নাম">
            <input type="text" id="cust-address" placeholder="ঠিকানা">
            <input type="text" id="cust-phone" placeholder="ফোন নম্বর">
            <button onclick="confirmOrder()" class="confirm-btn">অর্ডার নিশ্চিত করুন</button>
            <button onclick="document.getElementById('checkout-modal').style.display='none'" style="width:100%; margin-top:5px;">বন্ধ করুন</button>
        </div>
    </div>

    <script>
        // জাভাস্ক্রিপ্ট অংশ
        const products = [
            { id: 1, name: "কাশ্মীরি", price: 490 },
            { id: 2, name: "এয়ারটেল", price: 550 },
            { id: 3, name: "জমজম", price: 600 }
        ];

        function displayProducts() {
            const container = document.getElementById('flash-sale-products');
            container.innerHTML = products.map(p => `
                <div class="product-card">
                    <h4>${p.name}</h4>
                    <p>দাম: ৳${p.price}</p>
                    <div id="controls-${p.id}">
                        <button onclick="showOrderForm(${p.id})" class="pulsate-btn">Order Now</button>
                    </div>
                </div>
            `).join('');
        }

        function showOrderForm(id) {
            document.getElementById(`controls-${id}`).innerHTML = `
                <button onclick="changeQty(${id}, -1)">-</button>
                <span id="qty-${id}" style="margin:0 10px; font-weight:bold;">1</span>
                <button onclick="changeQty(${id}, 1)">+</button>
                <button onclick="openCheckout(${id})" style="display:block; width:100%; background:green; color:white; margin-top:5px;">Confirm</button>
            `;
        }

        function changeQty(id, val) {
            const span = document.getElementById(`qty-${id}`);
            let qty = Math.max(1, parseInt(span.innerText) + val);
            span.innerText = qty;
        }

        function openCheckout(id) {
            window.selectedProd = products.find(p => p.id === id);
            window.selectedQty = parseInt(document.getElementById(`qty-${id}`).innerText);
            document.getElementById('checkout-modal').style.display = 'block';
        }

        function confirmOrder() {
            const name = document.getElementById('cust-name').value;
            const addr = document.getElementById('cust-address').value;
            const phone = document.getElementById('cust-phone').value;
            if(!name || !addr || !phone) return alert("সব তথ্য দিন!");

            let delCharge = 130 + (window.selectedQty > 2 ? (window.selectedQty - 2) * 10 : 0);
            const total = (window.selectedProd.price * window.selectedQty) + delCharge;
            const msg = `নতুন অর্ডার!%0Aনাম: ${name}%0Aঠিকানা: ${addr}%0Aফোন: ${phone}%0Aপণ্য: ${window.selectedProd.name}%0Aপরিমাণ: ${window.selectedQty}%0Aমোট: ${total} টাকা`;
            window.location.href = `https://wa.me/8801969080416?text=${msg}`;
        }

        displayProducts();
    </script>
</body>
</html>
