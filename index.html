<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adury Collection | প্রিমিয়াম শপ</title>
    <style>
        :root { --primary: #db2777; --secondary: #25d366; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 0; }
        
        /* লোগো ও ব্যানার স্টাইল */
        .header-section { background: white; text-align: center; padding: 10px; }
        .logo { width: 120px; border-radius: 50%; margin-bottom: 10px; }
        .banner { width: 100%; height: 150px; object-fit: cover; }
        
        .nav { background: var(--primary); color: white; padding: 10px; text-align: center; }
        .category-bar { display: flex; gap: 10px; padding: 10px; overflow-x: auto; background: white; }
        .btn-cat { background: #eee; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .card { background: white; padding: 12px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .card img { width: 100%; height: 140px; border-radius: 8px; object-fit: cover; }
        
        .btn-add { 
            background: var(--primary); color: white; width: 100%; padding: 10px; 
            border: none; border-radius: 5px; margin-top: 10px; cursor: pointer;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        #cart-modal { position: fixed; bottom: 0; width: 100%; background: white; padding: 20px; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); display: none; }
    </style>
</head>
<body>

<!-- লোগো এবং ব্যানার সেকশন -->
<div class="header-section">
    <img src="YOUR_LOGO_URL_HERE" alt="Logo" class="logo">
    <img src="YOUR_BANNER_URL_HERE" alt="Banner" class="banner">
</div>

<div class="nav"><h2>Adury Collection</h2></div>

<div class="category-bar">
    <button class="btn-cat" onclick="filterProducts('all')">সব পণ্য</button>
    <button class="btn-cat" onclick="filterProducts('কাশ্মীরি')">কাশ্মীরি</button>
    <button class="btn-cat" onclick="filterProducts('জমজম')">জমজম</button>
</div>

<div class="grid" id="shop"></div>

<div id="cart-modal">
    <h3>আপনার অর্ডার লিস্ট</h3>
    <div id="cart-list" style="margin: 10px 0;"></div>
    <p>ডেলিভারি চার্জ: ১৫০ টাকা</p>
    <p><strong>সর্বমোট বিল: <span id="grand-total">0</span> টাকা</strong></p>
    <input type="text" id="name" placeholder="আপনার নাম" style="width:100%; padding:10px; margin:5px 0; box-sizing:border-box;">
    <input type="text" id="phone" placeholder="ফোন নাম্বার" style="width:100%; padding:10px; margin:5px 0; box-sizing:border-box;">
    <button style="background:var(--secondary); color:white; width:100%; padding:15px; border:none; border-radius:5px; font-weight:bold; cursor:pointer;" onclick="sendWhatsApp()">WhatsApp-এ অর্ডার কনফার্ম করুন</button>
</div>

<script>
    const products = [
        { id: 1, name: "কাশ্মীরি থ্রি-পিস", price: 480, cat: "কাশ্মীরি", img: "https://i.imgur.com/x0Q47z4.jpg" },
        { id: 2, name: "জমজম থ্রি-পিস", price: 620, cat: "জমজম", img: "https://i.imgur.com/5Jb2b3G.jpg" }
    ];
    let cart = [];

    function render(list) {
        document.getElementById('shop').innerHTML = list.map(p => `
            <div class="card">
                <img src="${p.img}" alt="${p.name}">
                <p style="margin: 8px 0;">${p.name}</p>
                <b>${p.price} টাকা</b>
                <button class="btn-add" onclick="addToCart(${p.id})">Add to Cart</button>
            </div>
        `).join('');
    }

    function filterProducts(cat) {
        if(cat === 'all') render(products);
        else render(products.filter(p => p.cat === cat));
    }

    function addToCart(id) {
        let p = products.find(x => x.id === id);
        let exists = cart.find(x => x.id === id);
        if(exists) exists.qty++; else cart.push({...p, qty: 1});
        document.getElementById('cart-modal').style.display = 'block';
        updateCart();
    }

    function updateCart() {
        let list = cart.map(p => `<div>${p.name} (x${p.qty}) - ${p.price * p.qty} টাকা</div>`).join('');
        let total = cart.reduce((sum, p) => sum + (p.price * p.qty), 0);
        document.getElementById('cart-list').innerHTML = list;
        document.getElementById('grand-total').innerText = total + 150;
    }

    function sendWhatsApp() {
        let name = document.getElementById('name').value;
        let phone = document.getElementById('phone').value;
        let msg = `অর্ডার কনফার্ম:%0Aনাম: ${name}%0Aফোন: ${phone}%0A---%0A` + cart.map(p => `${p.name} (x${p.qty})`).join('%0A') + "%0Aমোট বিল: " + document.getElementById('grand-total').innerText + " টাকা";
        window.open(`https://wa.me/8801969080416?text=${msg}`, '_blank');
    }
    render(products);
</script>
</body>
</html>
