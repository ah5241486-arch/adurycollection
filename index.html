<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adury Collection</title>
    <style>
        body { font-family: sans-serif; background: #fdf2f8; margin: 0; padding-bottom: 120px; }
        .header { background: #db2777; color: white; padding: 20px; text-align: center; }
        .product-card { background: white; margin: 10px; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .controls { display: flex; gap: 10px; align-items: center; }
        .btn-qty { padding: 5px 15px; background: #eee; border: none; border-radius: 5px; cursor: pointer; }
        .order-section { position: fixed; bottom: 0; width: 100%; background: white; padding: 20px; border-top: 2px solid #db2777; text-align: center; }
        .btn-order { background: #25d366; color: white; border: none; padding: 15px 30px; border-radius: 5px; font-weight: bold; width: 80%; cursor: pointer; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="header"><h1>Adury Collection</h1></div>

<div id="product-container"></div>

<div class="order-section">
    <p>সর্বমোট বিল: <span id="total-price">0</span> টাকা (+১৫০ ডেলিভারি)</p>
    <button class="btn-order" onclick="placeOrder()">অর্ডার নাও</button>
</div>

<script>
    const products = [
        { id: 1, name: "কাশ্মীরি থ্রি-পিস", price: 480, qty: 0 },
        { id: 2, name: "জমজম থ্রি-পিস", price: 620, qty: 0 }
    ];

    function updateView() {
        const container = document.getElementById('product-container');
        container.innerHTML = products.map((p, i) => `
            <div class="product-card">
                <div><b>${p.name}</b><br>${p.price} টাকা</div>
                <div class="controls">
                    <button class="btn-qty" onclick="changeQty(${i}, -1)">-</button>
                    <span>${p.qty}</span>
                    <button class="btn-qty" onclick="changeQty(${i}, 1)">+</button>
                </div>
            </div>
        `).join('');
        
        let total = products.reduce((sum, p) => sum + (p.price * p.qty), 0);
        document.getElementById('total-price').innerText = total + (total > 0 ? 150 : 0);
    }

    function changeQty(i, val) {
        products[i].qty = Math.max(0, products[i].qty + val);
        updateView();
    }

    function placeOrder() {
        let order = products.filter(p => p.qty > 0);
        if(order.length === 0) { alert("দয়া করে পণ্য সিলেক্ট করুন!"); return; }
        let msg = "অর্ডার লিস্ট:%0A" + order.map(p => `${p.name} - ${p.qty} পিস`).join("%0A") + "%0Aমোট বিল: " + document.getElementById('total-price').innerText + " টাকা";
        window.open("https://wa.me/8801969080416?text=" + msg, "_blank");
    }
    updateView();
</script>
</body>
</html>
