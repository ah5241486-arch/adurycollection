<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adury Collection</title>
    <style>
        :root { --primary: #db2777; --secondary: #25d366; }
        body { font-family: sans-serif; background: #f8f9fa; margin: 0; padding-bottom: 200px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: white; padding: 10px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .qty-control { margin: 10px 0; display: flex; justify-content: center; gap: 10px; align-items: center; }
        .btn-action { padding: 5px 12px; border: none; border-radius: 5px; cursor: pointer; background: #eee; }
        .btn-order { background: var(--primary); color: white; width: 100%; padding: 10px; border: none; border-radius: 5px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        #cart-section { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; box-shadow: 0 -5px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="grid" id="product-list"></div>

<div id="cart-section">
    <strong>সর্বমোট বিল: <span id="grand-total">0</span> টাকা</strong>
    <input type="text" id="name" placeholder="নাম" style="width:100%; margin:5px 0; padding:8px;">
    <input type="text" id="phone" placeholder="ফোন" style="width:100%; margin:5px 0; padding:8px;">
    <button style="background:var(--secondary); color:white; width:100%; padding:12px; border:none;" onclick="checkout()">অর্ডার নাও</button>
</div>

<script>
    const products = [
        { id: 1, name: "কাশ্মীরি থ্রি-পিস", price: 480 },
        { id: 2, name: "জমজম থ্রি-পিস", price: 620 }
    ];
    // প্রতিটি পণ্যের জন্য আলাদা qty সেট করা
    products.forEach(p => p.qty = 0);

    function render() {
        document.getElementById('product-list').innerHTML = products.map((p, i) => `
            <div class="card">
                <b>${p.name}</b><br>${p.price} টাকা
                <div class="qty-control">
                    <button class="btn-action" onclick="updateQty(${i}, -1)">-</button>
                    <span>${p.qty}</span>
                    <button class="btn-action" onclick="updateQty(${i}, 1)">+</button>
                </div>
            </div>
        `).join('');
        calculateTotal();
    }

    function updateQty(i, val) {
        products[i].qty = Math.max(0, products[i].qty + val);
        render();
    }

    function calculateTotal() {
        let total = products.reduce((sum, p) => sum + (p.price * p.qty), 0);
        document.getElementById('grand-total').innerText = total + (total > 0 ? 150 : 0);
    }

    function checkout() {
        let items = products.filter(p => p.qty > 0);
        if(items.length === 0) return alert("পণ্য সিলেক্ট করুন!");
        let msg = `অর্ডার:%0A` + items.map(p => `${p.name} (${p.qty} টি)`).join('%0A') + `%0Aমোট: ${document.getElementById('grand-total').innerText} টাকা`;
        window.open(`https://wa.me/8801969080416?text=${msg}`, '_blank');
    }
    render();
</script>
</body>
</html>
