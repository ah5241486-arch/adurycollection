<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adury Collection</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f4f4; }
        .header { background: #333; color: white; padding: 15px; text-align: center; }
        .hero-banner { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1595777457583-95e059d50a58?auto=format&fit=crop&w=1200&q=80'); background-size: cover; padding: 50px 20px; text-align: center; color: white; }
        .container { width: 95%; margin: auto; max-width: 600px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .product-card { background: white; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; overflow-y: auto; }
        .modal-content { background: white; width: 90%; max-width: 400px; margin: 50px auto; padding: 20px; border-radius: 15px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-confirm { background: #28a745; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-close { background: #dc3545; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <header class="header"><h1>Adury Collection</h1></header>

    <section class="hero-banner">
        <h1>Adury Collection</h1>
        <p>সেরা থ্রি-পিস কালেকশন</p>
    </section>

    <div class="container">
        <h2 style="text-align:center;">ফ্ল্যাশ সেল</h2>
        <div class="product-grid" id="flash-sale-products"></div>
    </div>

    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <h3 style="text-align: center;">অর্ডার কনফার্ম করুন</h3>
            <div id="order-summary" style="background:#f0f0f0; padding:10px; border-radius:8px; font-size:14px; margin-bottom:15px;"></div>
            <input type="text" id="cust-name" placeholder="নাম">
            <input type="text" id="cust-address" placeholder="ঠিকানা">
            <input type="text" id="cust-phone" placeholder="ফোন নম্বর">
            <button onclick="confirmOrder()" class="btn-confirm">অর্ডার নিশ্চিত করুন</button>
            <button onclick="closeModal()" class="btn-close">বন্ধ করুন</button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "কাশ্মীরি", price: 490 },
            { id: 2, name: "এয়ারটেল", price: 550 },
            { id: 3, name: "জমজম", price: 600 }
        ];

        function displayProducts() {
            const container = document.getElementById('flash-sale-products');
            container.innerHTML = products.map(p => `
                <div class="product-card">
                    <h4>${p.name}</h4>
                    <p>দাম: ৳${p.price}</p>
                    <div id="controls-${p.id}">
                        <button onclick="showOrderForm(${p.id})" style="background:#ff4081; color:white; border:none; padding:8px 15px; border-radius:5px; width:100%;">Order Now</button>
                    </div>
                </div>
            `).join('');
        }

        function showOrderForm(id) {
            document.getElementById(`controls-${id}`).innerHTML = `
                <button onclick="changeQty(${id}, -1)">-</button>
                <span id="qty-${id}" style="margin:0 10px; font-weight:bold;">1</span>
                <button onclick="changeQty(${id}, 1)">+</button>
                <button onclick="openCheckout(${id})" style="display:block; width:100%; margin-top:5px; background:#28a745; color:white; border:none; padding:5px;">Confirm</button>
            `;
        }

        function changeQty(id, val) {
            const span = document.getElementById(`qty-${id}`);
            let qty = Math.max(1, parseInt(span.innerText) + val);
            span.innerText = qty;
        }

        function openCheckout(id) {
            window.selectedProd = products.find(p => p.id === id);
            window.selectedQty = parseInt(document.getElementById(`qty-${id}`).innerText);
            
            const subTotal = window.selectedProd.price * window.selectedQty;
            let delCharge = 130 + (window.selectedQty > 2 ? (window.selectedQty - 2) * 10 : 0);
            const total = subTotal + delCharge;

            document.getElementById('order-summary').innerHTML = `
                <p>পণ্য: ${window.selectedProd.name} (${window.selectedQty} পিস)</p>
                <p>পণ্যের দাম: ৳${subTotal}</p>
                <p>ডেলিভারি চার্জ: ৳${delCharge}</p>
                <hr>
                <p style="font-size:16px; font-weight:bold; color:red;">মোট বিল: ৳${total}</p>
            `;
            document.getElementById('checkout-modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('checkout-modal').style.display = 'none'; }

        function confirmOrder() {
            const name = document.getElementById('cust-name').value;
            const addr = document.getElementById('cust-address').value;
            const phone = document.getElementById('cust-phone').value;
            if(!name || !addr || !phone) return alert("সব তথ্য দিন!");

            let delCharge = 130 + (window.selectedQty > 2 ? (window.selectedQty - 2) * 10 : 0);
            const totalBill = (window.selectedProd.price * window.selectedQty) + delCharge;
            const msg = `নতুন অর্ডার!%0Aপণ্য: ${window.selectedProd.name}%0Aপরিমাণ: ${window.selectedQty}%0Aমোট বিল: ${totalBill} টাকা%0Aনাম: ${name}%0Aঠিকানা: ${addr}%0Aফোন: ${phone}`;
            window.location.href = `https://wa.me/8801969080416?text=${msg}`;
        }

        displayProducts();
    </script>
</body>
</html>
