<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adury Collection | Professional eCommerce</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="header">
        <div class="container">
            <div class="logo">Adury<span>Collection</span></div>
            <nav class="navbar">
                <ul>
                    <li><a href="index.html">হোম</a></li>
                    <li><a href="#shop">শপ</a></li>
                    <li><a href="#contact">যোগাযোগ</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <h1>আপনার স্টাইলের নতুন ঠিকানা</h1>
                <p>সেরা কালেকশন এখন হাতের নাগালে।</p>
                <a href="#flash-sale" class="btn-shop">কেনাকাটা শুরু করুন</a>
            </div>
        </section>

        <section class="categories">
            <div class="container">
                <h2>ক্যাটাগরি</h2>
                <div class="cat-grid" id="category-section"></div>
            </div>
        </section>

        <section class="flash-sale" id="flash-sale">
            <div class="container">
                <h2>ফ্ল্যাশ সেল</h2>
                <div class="product-grid" id="flash-sale-products"></div>
            </div>
        </section>

        <section class="best-selling"><div class="container"><h2>বেস্ট সেলিং</h2><div id="best-products"></div></div></section>
        <section class="reviews"><div class="container"><h2>গ্রাহক মতামত</h2><div id="review-section"></div></div></section>
    </main>

    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <h3>অর্ডার কনফার্ম করুন (Cash On Delivery)</h3>
            <input type="text" id="cust-name" placeholder="নাম">
            <input type="text" id="cust-address" placeholder="ঠিকানা">
            <input type="text" id="cust-phone" placeholder="ফোন নম্বর">
            <button onclick="confirmOrder()" class="confirm-btn">অর্ডার নিশ্চিত করুন</button>
            <button onclick="document.getElementById('checkout-modal').style.display='none'">বন্ধ করুন</button>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; ২০২৬ Adury Collection - সর্বস্বত্ব সংরক্ষিত।</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
