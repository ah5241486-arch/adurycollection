<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adury Collection</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        header { background: #d63384; color: white; padding: 20px; text-align: center; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: white; border-radius: 10px; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; }
        .price { color: #d63384; font-weight: bold; margin: 10px 0; }
        .order-btn { background: #28a745; color: white; padding: 10px; text-decoration: none; border-radius: 5px; display: block; }
    </style>
</head>
<body>

<header><h1>Adury Collection</h1></header>

<div class="product-grid" id="app"></div>

<script>
    // এখানে আপনার পণ্যের তথ্য দিন
    const PRODUCTS = [
        { name: "থ্রি-পিস ১", price: "৪৯৯ টাকা", img: "https://via.placeholder.com/200" },
        { name: "থ্রি-পিস ২", price: "৫৫০ টাকা", img: "https://via.placeholder.com/200" }
    ];

    const app = document.getElementById('app');
    PRODUCTS.forEach(p => {
        app.innerHTML += `
            <div class="card">
                <img src="${p.img}" alt="${p.name}">
                <h3>${p.name}</h3>
                <div class="price">${p.price}</div>
                <a href="https://wa.me/8801969080416?text=আমি ${p.name} কিনতে চাই" class="order-btn">অর্ডার করুন</a>
            </div>
        `;
    });
</script>

</body>
</html>
