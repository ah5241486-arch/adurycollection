<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adury Collection</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f4f4; color: #333; }
        .header { background: #333; color: white; padding: 20px; text-align: center; }
        /* থ্রি-পিস শপ থিম ব্যানার */
        .hero-banner { 
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1595777457583-95e059d50a58?auto=format&fit=crop&w=1200&q=80'); 
            background-size: cover; 
            background-position: center; 
            padding: 80px 20px; 
            text-align: center; 
            color: white; 
        }
        .container { width: 90%; margin: auto; max-width: 800px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .product-card { background: white; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .pulsate-btn { background: #ff4081; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; }
        .modal-content { background: white; width: 90%; max-width: 400px; margin: 10% auto; padding: 20px; border-radius: 15px; text-align: left; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .confirm-btn { background: #28a745; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <header class="header"><h1>Adury Collection</h1></header>

    <section class="hero-banner">
        <h1 style="margin:0;">Adury Collection</h1>
        <p>সেরা মানের থ্রি-পিস কালেকশন এখন আপনার হাতের নাগালে!</p>
    </section>

    <div class="container">
        <h2 style="text-align:center; margin-top:20px;">আমাদের ফ্ল্যাশ সেল</h2>
        <div class="product-grid" id="flash-sale-products"></div>
    </div>

    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <h3 style="text-align: center; margin-top:0;">অর্ডার নিশ্চিত করুন</h3>
            <div id="order-summary" style="background:#f9f9f9; padding:15px; border-radius:8px; margin-bottom:15px; font-size: 14px; border: 1px dashed #ccc;"></div>
            <input type="text" id="cust-name" placeholder="আপনার নাম">
            <input type="text" id="cust-address" placeholder="আপনার ঠিকানা">
            <input type="text" id="cust-phone" placeholder="ফোন নম্বর">
            <button onclick="confirmOrder()" class="confirm-btn">অর্ডার কনফার্ম করুন</button>
            <button onclick="document.getElementById('checkout-modal').style.display='none'" style="width:100%; margin-top:10px; border:none; background:#eee; padding:10px; cursor:pointer; border-radius:5px;">বন্ধ করুন</button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "কাশ্মীরি থ্রি-পিস", price: 490 },
            { id: 2, name: "এয়ারটেল থ্রি-পিস", price: 550 },
            { id: 3, name: "জমজম থ্রি-পিস", price: 600 }
        ];

        function displayProducts() {
            const container = document.getElementById('flash-sale-products');
            container.innerHTML = products.map(p => `
                <div class="product-card">
                    <h4>${p.name}</h4>
                    <p>দাম: ৳${p.price}</p>
                    <div id="controls-${p.id}">
                        <button onclick="showOrderForm(${p.id})" class="pulsate-btn">Order Now</button>
                    </div>
                </div>
            `).join('');
        }

        function showOrderForm(id) {
            document.getElementById(`controls-${id}`).innerHTML = `
                <div style="margin:10px 0; display:flex; justify-content:center; gap:10px; align-items:center;">
                    <button onclick="changeQty(${id}, -1)" style="padding:5px 12px; cursor:pointer;">-</button>
                    <span id="qty-${id}" style="font-weight:bold; font-size:18px;">1</span>
                    <button onclick="changeQty(${id}, 1)" style="padding:5px 12px; cursor:pointer;">+</button>
                </div>
                <button onclick="openCheckout(${id})" style="width:100%; background:#28a745; color:white; border:none; padding:8px; cursor:pointer; border-radius:5px;">Confirm</button>
            `;
        }

        function changeQty(id, val) {
            const span = document.getElementById(`qty-${id}`);
            let qty = Math.max(1, parseInt(span.innerText) + val);
            span.innerText = qty;
        }

        function openCheckout(id) {
            window.selectedProd = products.find(p => p.id === id);
            window.selectedQty = parseInt(document.getElementById(`qty-${id}`).innerText);
            
            const subTotal = window.selectedProd.price * window.selectedQty;
            let delCharge = 130 + (window.selectedQty > 2 ? (window.selectedQty - 2) * 10 : 0);
            const total = subTotal + delCharge;

            document.getElementById('order-summary').innerHTML = `
                <p><strong>পণ্য:</strong> ${window.selectedProd.name}</p>
                <p><strong>পরিমাণ:</strong> ${window.selectedQty} পিস</p>
                <p><strong>পণ্যের দাম:</strong> ৳${subTotal}</p>
                <p><strong>ডেলিভারি চার্জ:</strong> ৳${delCharge}</p>
                <hr>
                <p style="font-size:16px; font-weight:bold; color:red;">মোট বিল: ৳${total}</p>
            `;
            document.getElementById('checkout-modal').style.display = 'block';
        }

        function confirmOrder() {
            const name = document.getElementById('cust-name').value;
            const addr = document.getElementById('cust-address').value;
            const phone = document.getElementById('cust-phone').value;
            if(!name || !addr || !phone) return alert("দয়া করে সব তথ্য দিন!");

            let delCharge = 130 + (window.selectedQty > 2 ? (window.selectedQty - 2) * 10 : 0);
            const totalBill = (window.selectedProd.price * window.selectedQty) + delCharge;
            
            const msg = `নতুন অর্ডার!%0A%0Aপণ্য: ${window.selectedProd.name}%0Aপরিমাণ: ${window.selectedQty} পিস%0Aপণ্যের দাম: ${window.selectedProd.price * window.selectedQty} টাকা%0Aডেলিভারি চার্জ: ${delCharge} টাকা%0Aমোট বিল: ${totalBill} টাকা%0A%0Aনাম: ${name}%0Aঠিকানা: ${addr}%0Aফোন: ${phone}`;
            
            window.location.href = `https://wa.me/8801969080416?text=${msg}`;
        }

        displayProducts();
    </script>
</body>
</html>
