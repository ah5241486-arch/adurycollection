<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adury Collection - প্রিমিয়াম শপ</title>
    <style>
        :root { --primary: #db2777; --secondary: #25d366; }
        body { font-family: 'Segoe UI', sans-serif; background: #fdf2f8; margin: 0; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .banner { background: white; padding: 15px; margin: 10px; border-radius: 10px; text-align: center; border: 2px dashed var(--primary); }
        .search-box { width: 90%; padding: 10px; margin: 10px; border-radius: 5px; border: 1px solid #ddd; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: white; padding: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .card img { width: 100%; height: 120px; border-radius: 8px; }
        .pulse-btn { background: var(--primary); color: white; padding: 10px; width: 100%; border: none; border-radius: 5px; cursor: pointer; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        .footer { background: #333; color: white; padding: 20px; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="header"><h1>Adury Collection</h1></div>

<div class="banner">
    <h3>🔥 নতুন কালেকশন ২০২৬</h3>
    <p>৫০০০ টাকার বেশি অর্ডারে ফ্রি ডেলিভারি!</p>
</div>

<input type="text" class="search-box" placeholder="পণ্যের নাম লিখে সার্চ করুন...">

<div class="grid" id="shop"></div>

<div class="footer">
    <p>পেমেন্ট মেথড: বিকাশ, নগদ, রকেট</p>
    <p>© ২০২৬ Adury Collection. সর্বস্বত্ব সংরক্ষিত</p>
</div>

<!-- অর্ডার প্যানেল -->
<div id="orderPanel" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000;">
    <div style="background:white; width:90%; max-width:400px; margin:50px auto; padding:20px; border-radius:15px;">
        <h3>অর্ডার কনফার্ম করুন</h3>
        <input type="text" id="name" placeholder="নাম" style="width:100%; padding:10px; margin:5px 0;">
        <input type="text" id="phone" placeholder="ফোন" style="width:100%; padding:10px; margin:5px 0;">
        <input type="text" id="addr" placeholder="ঠিকানা" style="width:100%; padding:10px; margin:5px 0;">
        <p>পণ্য: <span id="p-name"></span> | পিস: <span id="p-qty"></span></p>
        <p>সর্বমোট: <span id="p-total"></span> টাকা</p>
        <button style="background:var(--secondary); color:white; width:100%; padding:15px; border:none;" onclick="finishOrder()">WhatsApp-এ অর্ডার পাঠান</button>
        <button style="width:100%; padding:10px; margin-top:5px;" onclick="document.getElementById('orderPanel').style.display='none'">বাতিল</button>
    </div>
</div>

<script>
    const products = [
        { name: "কাশ্মীরি থ্রি-পিস", price: 480, img: "https://i.imgur.com/x0Q47z4.jpg" },
        { name: "জমজম থ্রি-পিস", price: 620, img: "https://i.imgur.com/5Jb2b3G.jpg" }
    ];

    let cart = products.map(p => ({...p, qty: 0}));

    function render() {
        document.getElementById('shop').innerHTML = cart.map((p, i) => `
            <div class="card">
                <img src="${p.img}">
                <b>${p.name}</b>
                <p>${p.price} টাকা</p>
                <button onclick="changeQty(${i}, -1)">-</button> <span>${p.qty}</span> <button onclick="changeQty(${i}, 1)">+</button>
                <button class="pulse-btn" onclick="openPanel(${i})" style="margin-top:10px">অর্ডার নাও</button>
            </div>
        `).join('');
    }

    function changeQty(i, v) { cart[i].qty = Math.max(0, cart[i].qty + v); render(); }
    function openPanel(i) {
        if(cart[i].qty < 1) { alert("পরিমাণ সিলেক্ট করুন!"); return; }
        document.getElementById('p-name').innerText = cart[i].name;
        document.getElementById('p-qty').innerText = cart[i].qty;
        document.getElementById('p-total').innerText = (cart[i].qty * cart[i].price) + 150;
        document.getElementById('orderPanel').style.display = 'block';
        window.activeIdx = i;
    }
    function finishOrder() {
        let p = cart[window.activeIdx];
        let msg = `অর্ডার কনফার্ম করুন:%0Aনাম: ${document.getElementById('name').value}%0Aফোন: ${document.getElementById('phone').value}%0Aপণ্য: ${p.name} (${p.qty} পিস)%0Aমোট: ${(p.qty * p.price) + 150} টাকা`;
        window.open("https://wa.me/8801969080416?text=" + msg, "_blank");
    }
    render();
</script>
</body>
</html>
